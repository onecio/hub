services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    networks:
      - edge
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/app/data
      - uploads_tmp:/app/tmp
    networks:
      - edge
      - internal
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32m
      - /var/cache/nginx:size=32m
      - /var/run:size=8m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  monitor-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "src/workers/monitorWorker.js"]
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/app/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32m
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backup:
    image: alpine:3.20
    restart: unless-stopped
    volumes:
      - db_data:/data:ro
      - backups:/backups
      - ./ops/backup.sh:/scripts/backup.sh:ro
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]
    env_file: .env
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32m
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

volumes:
  db_data:
  uploads_tmp:
  caddy_data:
  caddy_config:
  backups:

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
