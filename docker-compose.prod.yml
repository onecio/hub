# Override de produção — usar com:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Diferenças em relação ao docker-compose.yml base:
# - LOG_PRETTY desabilitado (JSON puro para SIEM)
# - Limites de recursos mais restritivos
# - Restart policy: always

services:
  backend:
    environment:
      NODE_ENV: production
      LOG_PRETTY: "false"
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  frontend:
    restart: always

  monitor-worker:
    environment:
      NODE_ENV: production
      LOG_PRETTY: "false"
    restart: always

  caddy:
    restart: always
