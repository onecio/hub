<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="description" content="HUB Institucional CADE - Acesso centralizado a sistemas, recursos e ferramentas">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">

  <title>HUB Institucional CADE</title>

  <link rel="stylesheet" href="/src/css/main.css">
  <link rel="stylesheet" href="/src/css/components.css">

  <!-- Preload fonts -->
  <link rel="preload" as="font" href="/src/fonts/inter-regular.woff2" type="font/woff2" crossorigin>
  <link rel="preload" as="font" href="/src/fonts/dm-sans-regular.woff2" type="font/woff2" crossorigin>
</head>
<body>
  <noscript>
    <div role="alert" class="noscript-warning">
      Este site requer JavaScript ativado. Por favor, habilite JavaScript em seu navegador.
    </div>
  </noscript>

  <!-- Skip link para acessibilidade (WCAG 2.1 AA) -->
  <a href="#main" class="skip-link">Pular para conteúdo principal</a>

  <!-- Header -->
  <hub-header id="header" role="banner" aria-label="Cabeçalho da aplicação"></hub-header>

  <!-- Main content -->
  <main id="main" role="main" class="main-container">
    <!-- Hero section -->
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-content">
        <h1 id="hero-title">Bem-vindo ao HUB Institucional</h1>
        <p class="hero-subtitle">Acesso centralizado a sistemas, recursos e ferramentas da CADE</p>
      </div>
    </section>

    <!-- Category filter -->
    <section class="resources-section" aria-labelledby="resources-title">
      <h2 id="resources-title" class="sr-only">Recursos por categoria</h2>
      <category-filter id="categories" aria-label="Filtrar recursos por categoria"></category-filter>

      <!-- Resource grid -->
      <resource-grid id="resources" aria-label="Grade de recursos disponíveis"></resource-grid>
    </section>
  </main>

  <!-- Login modal -->
  <login-modal id="login-modal" aria-hidden="true" aria-label="Modal de autenticação"></login-modal>

  <!-- Web Components -->
  <script src="/src/js/components/hub-header.js" type="module"></script>
  <script src="/src/js/components/category-filter.js" type="module"></script>
  <script src="/src/js/components/resource-grid.js" type="module"></script>
  <script src="/src/js/components/login-modal.js" type="module"></script>

  <!-- App bootstrap -->
  <script src="/src/js/app.js" type="module"></script>
</body>
</html>
